<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  <main class="auth-card">
    <div class="brand">
      <div class="brand-icon">▸_</div>
      <div>
        <h1>Welcome to Pyttyd</h1>
        <p>Not initialized yet</p>
      </div>
    </div>
    <div class="setup-steps">
      <p>Run the following command on the server to generate credentials and configuration:</p>
      <pre class="code-block">pyttyd init</pre>
      <p>Then start the server:</p>
      <pre class="code-block">pyttyd</pre>
      <p class="auth-foot">Run on the host machine to share your local shell.</p>
    </div>
  </main>
</body>
</html>
